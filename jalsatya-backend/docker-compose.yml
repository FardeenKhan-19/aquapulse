version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aquapulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aquapulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquapulse -d aquapulse_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aquapulse:password@db:5432/aquapulse_db
      DATABASE_URL_SYNC: postgresql://aquapulse:password@db:5432/aquapulse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/ml/trained_models
    command: >
      sh -c "
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  celery_worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aquapulse:password@db:5432/aquapulse_db
      DATABASE_URL_SYNC: postgresql://aquapulse:password@db:5432/aquapulse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_data:/app/ml/trained_models
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aquapulse:password@db:5432/aquapulse_db
      DATABASE_URL_SYNC: postgresql://aquapulse:password@db:5432/aquapulse_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  model_data:
