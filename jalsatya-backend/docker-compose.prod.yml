version: "3.9"

services:
  app:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - model_data:/app/ml/trained_models
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  celery_worker:
    build: .
    env_file:
      - .env
    volumes:
      - model_data:/app/ml/trained_models
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  celery_beat:
    build: .
    env_file:
      - .env
    command: celery -A tasks.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  model_data:
